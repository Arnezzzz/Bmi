<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gym BMI Calculator</title>
<style>
    body {
        background: linear-gradient(to right, #0f2027, #203a43, #2c5364);
        color: white;
        font-family: Arial, sans-serif;
        text-align: center;
        padding: 50px;
    }

    h1 {
        color: #00ffcc;
    }

    .container {
        background: rgba(255, 255, 255, 0.1);
        padding: 30px;
        border-radius: 20px;
        width: 300px;
        margin: 0 auto;
        box-shadow: 0 0 15px rgba(0,0,0,0.5);
    }

    input {
        width: 90%;
        padding: 10px;
        margin: 10px 0;
        border: none;
        border-radius: 8px;
        text-align: center;
        font-size: 16px;
    }

    button {
        background-color: #00ffcc;
        color: black;
        border: none;
        padding: 10px 20px;
        border-radius: 8px;
        font-size: 16px;
        cursor: pointer;
        transition: 0.3s;
    }

    button:hover {
        background-color: #00bfa6;
    }

    #result {
        margin-top: 20px;
        font-size: 20px;
        color: #ffeb3b;
    }
</style>
</head>
<body>

<h1>🏋️ Gym BMI Calculator</h1>
<div class="container">
    <label for="height">Enter your height (in inches):</label><br>
    <input type="number" id="height" placeholder="e.g. 70"><br>

    <label for="weight">Enter your weight (in pounds):</label><br>
    <input type="number" id="weight" placeholder="e.g. 150"><br>

    <button onclick="calculateBMI()">Calculate BMI</button>

    <div id="result"></div>
</div>

<script>
function calculateBMI() {
    let height = parseFloat(document.getElementById("height").value);
    let weight = parseFloat(document.getElementById("weight").value);

    if (!height || !weight) {
        document.getElementById("result").innerHTML = "Please enter both height and weight.";
        return;
    }

    // Convert inches to meters and pounds to kilograms
    let heightMeters = height * 0.0254;
    let weightKg = weight * 0.453592;

    // Calculate BMI
    let bmi = weightKg / (heightMeters * heightMeters);
    let category = "";

    if (bmi < 18.5) category = "Underweight 🦴";
    else if (bmi < 25) category = "Normal Weight 💪";
    else if (bmi < 30) category = "Overweight ⚖️";
    else category = "Obese 🚨";

    document.getElementById("result").innerHTML =
        `Your BMI is <strong>${bmi.toFixed(1)}</strong> (${category})`;
}
</script>

</body>
</html>
